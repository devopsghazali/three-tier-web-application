
name: Build and Push Docker Images

on:
  push:
    branches:
      - main

  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # Step 1: GitHub runner par repository code download karega
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Docker Buildx setup karega
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Docker Hub mein securely login karega
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Backend image build aur push karega
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/three-tier-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/three-tier-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 5: Frontend image build aur push karega
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/three-tier-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/three-tier-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

